<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BM Lease — Prospect Sourcing Engine</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f3;
    color: #1a1a1a;
    min-height: 100vh;
  }

  .topbar {
    background: #fff;
    border-bottom: 1px solid #e5e5e5;
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .logo { font-size: 15px; font-weight: 600; color: #1a1a1a; }
  .logo span { color: #0057B8; }
  .tagline { font-size: 12px; color: #888; border-left: 1px solid #e5e5e5; padding-left: 10px; }

  .page { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; }

  .page-header { margin-bottom: 1.5rem; }
  .page-header h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .page-header p { font-size: 14px; color: #666; }

  .controls-bar {
    background: #fff;
    border: 1px solid #e5e5e5;
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .controls-label { font-size: 12px; color: #888; white-space: nowrap; }

  .sector-pills { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }

  .pill {
    font-size: 12px;
    padding: 5px 13px;
    border-radius: 20px;
    border: 1px solid #e0e0e0;
    background: #fff;
    color: #555;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .pill:hover { border-color: #0057B8; color: #0057B8; }
  .pill.active { background: #0057B8; border-color: #0057B8; color: #fff; }

  .run-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 9px 20px;
    background: #0057B8;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .run-btn:hover { background: #004a9e; }
  .run-btn:disabled { background: #93b8e3; cursor: not-allowed; }

  .metrics {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 1.5rem;
  }

  .metric-card {
    background: #fff;
    border: 1px solid #e5e5e5;
    border-radius: 10px;
    padding: 14px 16px;
  }
  .metric-label { font-size: 11px; color: #888; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.4px; }
  .metric-value { font-size: 26px; font-weight: 600; color: #1a1a1a; }
  .metric-card.blue .metric-value { color: #0057B8; }
  .metric-card.green .metric-value { color: #0a7c52; }
  .metric-card.amber .metric-value { color: #9a5e00; }

  .section-title {
    font-size: 13px;
    font-weight: 500;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }

  .prospect-list { display: flex; flex-direction: column; gap: 10px; }

  .card {
    background: #fff;
    border: 1px solid #e5e5e5;
    border-radius: 12px;
    padding: 16px 18px;
    transition: box-shadow 0.15s;
  }
  .card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
  .card.high-priority { border-left: 3px solid #0057B8; }

  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 12px; }

  .co-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .co-meta { display: flex; gap: 12px; font-size: 12px; color: #888; flex-wrap: wrap; }
  .co-meta span { display: flex; align-items: center; gap: 4px; }

  .badges { display: flex; gap: 6px; flex-shrink: 0; align-items: flex-start; flex-wrap: wrap; justify-content: flex-end; }

  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .badge-slb { background: #e0f2ee; color: #085041; }
  .badge-dl { background: #ddeeff; color: #0c447c; }
.badge-fac { background: #f5e6ff; color: #5b1fa3; }
.sidebar-panel { background: #f5f5f7; border-right: 1px solid #e5e5ea; padding: 1.5rem; width: 260px; display: flex; flex-direction: column; gap: 1rem; overflow-y: auto; position: sticky; top: 56px; height: calc(100vh - 56px); }
.layout-grid { display: grid; grid-template-columns: 260px 1fr; min-height: calc(100vh - 56px); }
.main-panel { padding: 1.5rem 2rem; }
.sec-lbl { font-size: 10px; font-weight: 600; color: #8e8e93; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 6px; }
.stag { font-size: 11px; font-weight: 500; padding: 5px 11px; border-radius: 20px; border: 1px solid #d1d1d6; color: #636366; cursor: pointer; background: #fff; font-family: inherit; transition: all 0.15s; white-space: nowrap; }
.stag:hover { border-color: #8b1a2e; color: #8b1a2e; }
.stag.on { border-color: #8b1a2e; color: #fff; background: #8b1a2e; }
.tags-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
.sdivider { height: 1px; background: #e5e5ea; }
.flbl { font-size: 12px; color: #48484a; margin-bottom: 5px; font-weight: 500; }
.fsel { width: 100%; padding: 8px 11px; border: 1px solid #d1d1d6; border-radius: 8px; font-size: 13px; font-family: inherit; background: #fff; color: #1c1c1e; }
.fsel:focus { outline: none; border-color: #8b1a2e; }
.fta { width: 100%; padding: 8px 11px; border: 1px solid #d1d1d6; border-radius: 8px; font-size: 13px; font-family: inherit; background: #fff; color: #1c1c1e; resize: vertical; min-height: 65px; }
.fta:focus { outline: none; border-color: #8b1a2e; }
.go-btn { background: #8b1a2e; color: #fff; border: none; border-radius: 10px; padding: 12px; font-size: 13px; font-weight: 600; cursor: pointer; width: 100%; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.15s; margin-top: auto; }
.go-btn:hover { background: #a02236; }
.go-btn:disabled { background: #c7c7cc; cursor: not-allowed; }
.metrics-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.5rem; }
.mcard { background: #fff; border: 1px solid #e5e5ea; border-radius: 10px; padding: 12px 14px; }
.mcard.burg .mval { color: #8b1a2e; }
.mcard.grn .mval { color: #34c759; }
.mlbl { font-size: 11px; color: #8e8e93; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.4px; }
.mval { font-size: 22px; font-weight: 600; color: #1c1c1e; }
.save-prospect-btn { margin-left: auto; font-size: 11px; font-weight: 600; color: #8e8e93; border: 1px solid #e5e5ea; border-radius: 8px; padding: 4px 12px; background: #fff; cursor: pointer; font-family: inherit; transition: all 0.15s; }
.save-prospect-btn:hover { border-color: #34c759; color: #34c759; }
.save-prospect-btn.saved { border-color: #34c759; color: #34c759; background: #f0fdf4; }
  .badge-hot { background: #fff3e0; color: #7a4400; }

  .fit-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .fit-label { font-size: 11px; color: #888; white-space: nowrap; }
  .fit-bar { flex: 1; height: 4px; background: #eee; border-radius: 2px; overflow: hidden; max-width: 140px; }
  .fit-fill { height: 100%; border-radius: 2px; background: #0057B8; }
  .fit-score { font-size: 12px; font-weight: 600; color: #0057B8; }

  .info-section { margin-bottom: 10px; }
  .info-label { font-size: 11px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 4px; }
  .info-text { font-size: 13px; color: #333; line-height: 1.6; }

  .expand-toggle {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: #0057B8;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    margin-bottom: 8px;
  }
  .expand-toggle svg { transition: transform 0.2s; }
  .expand-toggle.open svg { transform: rotate(180deg); }

  .product-reason {
    font-size: 13px;
    color: #333;
    line-height: 1.6;
    background: #f8f9ff;
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 10px;
    display: none;
  }
  .product-reason.visible { display: block; }

  .contact-row {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    padding-top: 10px;
    border-top: 1px solid #f0f0f0;
  }
  .contact-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #555; }

  .empty-state {
    text-align: center;
    padding: 4rem 1rem;
    color: #888;
    background: #fff;
    border: 1px solid #e5e5e5;
    border-radius: 12px;
  }
  .empty-state svg { margin-bottom: 12px; opacity: 0.4; }
  .empty-state p { font-size: 14px; }

  .loading-state {
    text-align: center;
    padding: 4rem 1rem;
    color: #888;
    background: #fff;
    border: 1px solid #e5e5e5;
    border-radius: 12px;
  }
  .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid #e0e0e0;
    border-top-color: #0057B8;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-sub { font-size: 12px; color: #aaa; margin-top: 6px; }

  .error-state {
    text-align: center;
    padding: 2rem 1rem;
    color: #c0392b;
    background: #fff5f5;
    border: 1px solid #ffd5d5;
    border-radius: 12px;
    font-size: 14px;
  }

  @media (max-width: 600px) {
    .metrics { grid-template-columns: repeat(2, 1fr); }
    .card-top { flex-direction: column; }
    .badges { justify-content: flex-start; }
  }
</style>
</head>

    <div>
      <div style="font-size:12px;color:#48484a;margin-bottom:5px;font-weight:500;">Additional notes (optional)</div>
      <textarea id="extraNotes" style="width:100%;padding:8px 11px;border:1px solid #d1d1d6;border-radius:8px;font-size:13px;font-family:inherit;background:#fff;color:#1c1c1e;resize:vertical;min-height:65px;" placeholder="e.g. Focus on companies that own warehouses, recently expanded..."></textarea>
    </div>

    <button id="sourcingBtn" onclick="runSourcing()" style="background:#8b1a2e;color:#fff;border:none;border-radius:10px;padding:12px;font-size:13px;font-weight:600;cursor:pointer;width:100%;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;transition:background 0.15s;margin-top:auto;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      Find prospects
    </button>
  </div>

  <!-- MAIN -->
  <div style="padding:1.5rem 2rem;">
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem;" id="sourcingMetrics" style="display:none;">
      <div style="background:#fff;border:1px solid #e5e5ea;border-radius:10px;padding:12px 14px;"><div style="font-size:11px;color:#8e8e93;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.4px;">Total found</div><div style="font-size:22px;font-weight:600;" id="smTotal">0</div></div>
      <div style="background:#fff;border:1px solid #e5e5ea;border-radius:10px;padding:12px 14px;"><div style="font-size:11px;color:#8e8e93;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.4px;">Sale & leaseback</div><div style="font-size:22px;font-weight:600;color:#8b1a2e;" id="smSLB">0</div></div>
      <div style="background:#fff;border:1px solid #e5e5ea;border-radius:10px;padding:12px 14px;"><div style="font-size:11px;color:#8e8e93;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.4px;">Direct lease</div><div style="font-size:22px;font-weight:600;" id="smDL">0</div></div>
      <div style="background:#fff;border:1px solid #e5e5ea;border-radius:10px;padding:12px 14px;"><div style="font-size:11px;color:#8e8e93;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.4px;">High priority</div><div style="font-size:22px;font-weight:600;color:#34c759;" id="smHot">0</div></div>
    </div>

    <div id="prospectContainer">
      <div style="text-align:center;padding:4rem 1rem;color:#888;background:#fff;border:1px solid #e5e5ea;border-radius:12px;font-size:14px;">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin:0 auto 12px;display:block;opacity:0.3;"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6M9 12h6M9 15h4"/></svg>
        Click <strong>Find prospects</strong> to source Egyptian companies
      </div>
    </div>
  </div>
</div>
  </div><!-- end main-panel -->
</div><!-- end layout-grid -->

<script>
function saveApiKey(val) {
  const key = val.trim();
  if (key) {
    localStorage.setItem('bm_prospector_key', key);
    document.getElementById('keyStatus').style.background = '#34c759';
  }
}

function getApiKey() {
  return localStorage.getItem('bm_prospector_key') || ANTHROPIC_API_KEY;
}

// Load saved key on startup
window.addEventListener('load', function() {
  const saved = getApiKey();
  if (saved) {
    document.getElementById('apiKeyInput').value = saved;
    document.getElementById('keyStatus').style.background = '#34c759';
  }
});

const ANTHROPIC_API_KEY = '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';

const CRITERIA = { sector: 'any', location: 'any', product: 'any', size: 'any' };
let allProspects = [];
let savedProspects = JSON.parse(localStorage.getItem('bm_saved') || '[]');

function pickTag(btn, group) {
  const container = btn.closest('[id^="t"]') || btn.parentElement;
  if (btn.dataset.v === 'any') {
    container.querySelectorAll('.stag').forEach(t => t.classList.remove('on'));
    btn.classList.add('on');
    CRITERIA[group] = 'any';
  } else {
    const anyBtn = container.querySelector('[data-v="any"]');
    if (anyBtn) anyBtn.classList.remove('on');
    btn.classList.toggle('on');
    const active = [...container.querySelectorAll('.stag.on')].map(t => t.dataset.v);
    if (!active.length) {
      if (anyBtn) anyBtn.classList.add('on');
      CRITERIA[group] = 'any';
    } else {
      CRITERIA[group] = active.join(', ');
    }
  }
}

function updateMetrics(prospects) {
  const el = document.getElementById('sourcingMetrics');
  if (el) el.style.display = 'grid';
  const t = document.getElementById('smTotal');
  const s = document.getElementById('smSLB');
  const d = document.getElementById('smDL');
  const h = document.getElementById('smHot');
  if (t) t.textContent = prospects.length;
  if (s) s.textContent = prospects.filter(p => p.productType === 'SLB').length;
  if (d) d.textContent = prospects.filter(p => p.productType === 'DL').length;
  if (h) h.textContent = prospects.filter(p => p.priority === 'high').length;
}

function renderProspects(prospects) {
  const container = document.getElementById('prospectContainer');
  if (!container) return;
  if (!prospects || !prospects.length) {
    container.innerHTML = '<div class="empty-state"><p>No prospects found. Try different criteria.</p></div>';
    return;
  }
  const sorted = [...prospects].sort((a, b) => b.fitScore - a.fitScore);
  container.innerHTML = '<div class="section-title">' + sorted.length + ' prospects found</div><div class="prospect-list">' +
    sorted.map((p, i) => {
      const ptCls = p.productType === 'SLB' ? 'badge-slb' : p.productType === 'DL' ? 'badge-dl' : 'badge-fac';
      const ptLbl = p.productType === 'SLB' ? 'Sale & leaseback' : p.productType === 'DL' ? 'Direct lease' : 'Factoring';
      const isSaved = savedProspects.includes(p.name);
      return '<div class="p-card ' + (p.priority === 'high' ? 'high-priority' : '') + '">' +
        '<div class="p-card-top"><div>' +
          '<div class="co-name">' + p.name + (p.nameAr ? ' <span style="color:#8e8e93;font-size:13px;font-weight:400;">' + p.nameAr + '</span>' : '') + '</div>' +
          '<div class="co-meta"><span>' + p.location + '</span><span>' + p.sector + '</span><span>' + (p.employees || p.size) + '</span></div>' +
        '</div>' +
        '<div class="badges">' +
          '<span class="badge ' + ptCls + '">' + ptLbl + '</span>' +
          (p.priority === 'high' ? '<span class="badge badge-hot">High priority</span>' : '') +
        '</div></div>' +
        '<div class="fit-row"><span class="fit-label">Fit score</span>' +
          '<div class="fit-bar"><div class="fit-fill" style="width:' + p.fitScore + '%"></div></div>' +
          '<span class="fit-score">' + p.fitScore + '%</span>' +
        '</div>' +
        '<div class="info-label">Why a prospect</div>' +
        '<div class="info-text">' + p.whyProspect + '</div>' +
        (p.assetProfile ? '<div class="info-label">Asset profile</div><div class="info-text">' + p.assetProfile + '</div>' : '') +
        '<button class="expand-toggle" id="etoggle-' + i + '" onclick="toggleReason(' + i + ')">' +
          '<svg width="13" height="13" id="earrow-' + i + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>' +
          'Product fit & how to approach' +
        '</button>' +
        '<div class="product-reason" id="ereason-' + i + '">' +
          (p.productReasoning || '') + (p.approachStrategy ? '<br><br><strong>How to approach:</strong> ' + p.approachStrategy : '') +
        '</div>' +
        '<div class="contact-row">' +
          '<div class="contact-item">' + p.contactName + '</div>' +
          '<div class="contact-item">' + p.contactPhone + '</div>' +
          '<div class="contact-item">' + p.contactEmail + '</div>' +
          '<button class="save-btn ' + (isSaved ? 'saved' : '') + '" id="spbtn-' + i + '" onclick="toggleSave(' + i + ',\'' + p.name.replace(/'/g, "\'") + '\')">' +
            (isSaved ? 'Saved' : '+ Save') +
          '</button>' +
        '</div></div>';
    }).join('') + '</div>';
}

function toggleReason(i) {
  const el = document.getElementById('ereason-' + i);
  const arrow = document.getElementById('earrow-' + i);
  if (!el) return;
  const visible = el.classList.toggle('visible');
  if (arrow) arrow.style.transform = visible ? 'rotate(180deg)' : '';
}

function toggleSave(i, name) {
  const btn = document.getElementById('spbtn-' + i);
  const idx = savedProspects.indexOf(name);
  if (idx !== -1) {
    savedProspects.splice(idx, 1);
    if (btn) { btn.textContent = '+ Save'; btn.classList.remove('saved'); }
  } else {
    savedProspects.push(name);
    if (btn) { btn.textContent = 'Saved'; btn.classList.add('saved'); }
  }
  localStorage.setItem('bm_saved', JSON.stringify(savedProspects));
}

async function runSourcing() {
  const btn = document.getElementById('sourcingBtn');
  if (!btn) return;
  if (!getApiKey()) { alert('Please paste your Anthropic API key in the field at the top right.'); return; }
  btn.disabled = true;
  btn.textContent = 'Searching...';

  const sector = CRITERIA.sector === 'any' ? 'any sector' : CRITERIA.sector;
  const location = CRITERIA.location === 'any' ? 'Egypt including industrial zones' : CRITERIA.location;
  const product = CRITERIA.product === 'any' ? 'SLB, DL, or FAC' : CRITERIA.product;
  const size = CRITERIA.size === 'any' ? 'any size' : CRITERIA.size;
  const countEl = document.getElementById('resN');
  const count = countEl ? countEl.value : '6';
  const notesEl = document.getElementById('extraNotes');
  const notes = notesEl ? notesEl.value.trim() : '';

  const metricsEl = document.getElementById('sourcingMetrics');
  if (metricsEl) metricsEl.style.display = 'none';

  const container = document.getElementById('prospectContainer');
  if (container) container.innerHTML = '<div class="loading-state"><div class="spinner"></div><div>Searching for real Egyptian companies...</div><div class="loading-sub">Using web search to find actual prospects</div></div>';

  const seed = Math.floor(Math.random() * 99999);

  const prompt = 'You are a senior BD specialist at BM Lease, Banque Misr leasing arm Egypt. Seed:' + seed + '.\n\n' +
    'Use your web_search tool to find exactly ' + count + ' REAL Egyptian companies that could be leasing prospects.\n\n' +
    'Criteria: Sector=' + sector + ' | Location=' + location + ' | Product=' + product + ' | Size=' + size + (notes ? ' | Notes=' + notes : '') + '\n\n' +
    'Search for real companies using queries like:\n' +
    '- "' + sector + ' companies in ' + location + '"\n' +
    '- "factories Egypt industrial zone ' + sector + '"\n' +
    '- site:yellowpages.com.eg "' + sector + '"\n' +
    '- "' + sector + ' manufacturer Egypt"\n\n' +
    'Target: Mid-market family-owned factories, manufacturers in Egyptian industrial zones (10th of Ramadan, Borg El Arab, Sadat City, 6th October, Obour). Own real assets, NOT cash-rich or publicly listed.\n\n' +
    'SLB=owns assets wants capital. DL=needs new equipment. FAC=has receivables needs cash.\n\n' +
    'Return ONLY a JSON array, no markdown:\n' +
    '[{"name":"Company name","nameAr":"Arabic or empty","sector":"sub-sector","location":"City and zone","size":"SME or Mid-market","employees":"headcount","productType":"SLB or DL or FAC","fitScore":85,"priority":"high or medium or low","assetProfile":"What they own, 2 sentences","whyProspect":"Why leasing prospect, 2-3 sentences","productReasoning":"Why this product fits, 2 sentences","approachStrategy":"How to approach, 2 sentences","contactName":"Name and title","contactPhone":"+20 1X XXXX XXXX","contactEmail":"name@company.com"}]';

  try {
    const response = await fetch('https://bm-propects.taherabdallah3.workers.dev', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 8000,

        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error ? err.error.message : 'API error ' + response.status);
    }

    const data = await response.json();
    let text = '';
    for (const block of data.content) {
      if (block.type === 'text') text += block.text || '';
    }
    const clean = text.replace(/```json|```/g, '').trim();
    const start = clean.indexOf('[');
    const end = clean.lastIndexOf(']');
    if (start === -1 || end === -1) throw new Error('No results found. Try again.');
    allProspects = JSON.parse(clean.slice(start, end + 1));

    updateMetrics(allProspects);
    renderProspects(allProspects);

  } catch(err) {
    if (container) container.innerHTML = '<div class="empty-state"><p style="color:#dc2626;">Error: ' + err.message + '</p></div>';
  }

  btn.disabled = false;
  btn.textContent = 'Find prospects';
}
</script>
</body>
</html>
